name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ['3.9', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -r requirements.txt
      - run: python -m pip check
      - run: python -m compileall -q .
      - run: python -m unittest discover -s tests -v
      - run: python scripts/secret_scan.py
      - name: macOS setup and wrapper smoke
        if: runner.os == 'macOS' && matrix.python-version == '3.12'
        shell: bash
        run: |
          ./setup.sh
          test "$(./manage.sh --version)" = "0.1.0-rc1"
          set +e
          output=$(WECHAT_MANAGER_VAULT="$RUNNER_TEMP/wechat-manager-smoke" ./manage.sh refresh --dry-run 2>&1)
          status=$?
          set -e
          test "$status" -ne 0
          ! grep -q 'ModuleNotFoundError' <<<"$output"
      - name: Windows setup and wrapper smoke
        if: runner.os == 'Windows' && matrix.python-version == '3.12'
        shell: pwsh
        run: |
          .\setup.ps1
          $version = & .\manage.cmd --version
          if ($version.Trim() -ne '0.1.0-rc1') { throw 'manage.cmd version smoke failed' }
          $env:WECHAT_MANAGER_VAULT = Join-Path $env:RUNNER_TEMP 'wechat-manager-smoke'
          $output = .\manage.cmd refresh --dry-run 2>&1 | Out-String
          if ($LASTEXITCODE -eq 0) { throw 'Unconfigured refresh unexpectedly succeeded' }
          if ($output -match 'ModuleNotFoundError') { throw 'manage.cmd bypassed the repository environment' }
